version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kepitink-app
    restart: unless-stopped

    environment:
      APP_NAME: "${APP_NAME:-KEPITINK}"
      APP_KEY: "${APP_KEY}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: "${APP_URL:-https://kepitink.dcat.web.id}"

      LOG_CHANNEL: stderr
      LOG_LEVEL: "${LOG_LEVEL:-info}"

      DB_CONNECTION: "${DB_CONNECTION:-mysql}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"

      SESSION_DRIVER: "${SESSION_DRIVER:-database}"
      SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"
      SESSION_DOMAIN: "${SESSION_DOMAIN:-}"
      CACHE_STORE: "${CACHE_STORE:-database}"
      QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"

      SANCTUM_STATEFUL_DOMAINS: "${SANCTUM_STATEFUL_DOMAINS:-}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-}"
      CORS_ALLOWED_ORIGINS_PATTERNS: "${CORS_ALLOWED_ORIGINS_PATTERNS:-}"
      FRONTEND_URL: "${FRONTEND_URL:-}"

      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_ENCRYPTION: "${MAIL_ENCRYPTION:-}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-noreply@kepitink.local}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-PMIREQDAR}"

      TRUSTED_PROXIES: "*"

    volumes:
      - app_storage:/var/www/html

    networks:
      - dokploy-network

volumes:
  app_storage:

networks:
  dokploy-network:
    external: true